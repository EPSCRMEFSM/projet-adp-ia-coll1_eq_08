    <script type="text/javascript">

        function OpenEspaceCollaboratifDiv()
    {
          

               $('#imageLoad').show();
            $('#imageLoad').parent().css("text-align", "center");
            $('#divEspaceCollab').hide();

            $.ajax({
                type: 'POST',
                url: '/moutamadris/General/GetEspaceCollaboratif', // we are calling json method
                success: function (resulat) {
                    $("#divEspaceCollab").html(resulat);
                    $('#imageLoad').hide();
                    $('#divEspaceCollab').show();
                    $('#divEspaceCollab').parent().removeAttr("style");
                }
            });
    }

    $(document).ready(function () {


        var espaceCollaboratiftokenExist = 'False';
            var openEspaceCollaboratif= 'False';


        if (espaceCollaboratiftokenExist == 'True') {
            $(".collabBtn").on("click", function (e) {

                OpenEspaceCollaboratifDiv();
            });


            if (openEspaceCollaboratif == 'True') {
                $('.innerCollabSpace').toggleClass('open');
                $('body').toggleClass('openCollabSpace');
                OpenEspaceCollaboratifDiv();
            }
        }
        else {
            $(".collabBtn").on("click", function (e) {
                window.location.href = "https://login.microsoftonline.com/taalim.ma/oauth2/v2.0/authorize?client_id=6d02a224-581f-4788-a853-e3bf2461319a&response_type=code&redirect_uri=https://massarservice.men.gov.ma/moutamadris/General/AcquireTokenByAuthorizationCode&scope=openid&prompt=select_account";
            });
        }





        $(".btnEleve").click(function () {
            if (location.href.indexOf("/moutamadris/DemandeOrientation") >= 0) {
                var codeEleve = $(this).data('code');
                location.href = '/moutamadris/DemandeOrientation' + '?CodeEleve=' + codeEleve;
            }
            else if (location.href.indexOf("/moutamadris/General/Home") < 0) {
                var codeEleve = $(this).data('code');
                location.href = '/moutamadris/General/Home' + '?CodeEleve=' + codeEleve;
            }
        })



            


            $(document).on('hidden.bs.modal', function () {
                $('body').css('padding-right', 0);
            })

            $(document).on('hidden.bs.shown', function () {
                $('body').css('padding-right', 0);
            })

            $('.date .form-control').datepicker({
                language: lang,
                format: 'dd/mm/yyyy',
                autoclose: true,
                todayHighlight: true,
                forceParse: false,

            });
        });



        //affichage du waiter pour les ajax calls (loading...)
        $(document).on({
            ajaxSend: function (event, xhr, options) {
                $('body').addClass('loading');
            },
            ajaxStop: function () {
                $('body').removeClass('loading');
            },
            ajaxError: function (xhr, props) {
                $('body').removeClass('loading');


                if (props.status == 401 || props.status == 405) {

                    location.reload();
                    return;
                }

                if (props.status == 403) {
                    $.errorMessageBox('Error', 'Accès non autorisé !!!!!!!');
                    return;
                }



                if (props.status != 200) {
                    $.errorMessageBox('Error', 'حدث خطأ أثناء تنفيذ هذه العملية  , يرجى إعادة المحاولة لاحقا');
                }



            }
        });




        var GlobalizeCulture = Globalize.culture(culture);

        $.validator.methods.number = function (value, element) {
            return this.optional(element) || jQuery.isNumeric(Globalize.parseFloat(value));
        }

        $.validator.methods.date = function (value, element) {

            //This is not ideal but Chrome passes dates through in ISO1901 format regardless of locale
            //and despite displaying in the specified format.
            return this.optional(element)
                || Globalize.parseDate(value, "dd/mm/yyyy", GlobalizeCulture)
                || Globalize.parseDate(value, "yyyy-mm-dd");
        }

    </script>
